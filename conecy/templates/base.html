<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Conecy{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple: #6B5CF6;
            --purple-light: #8B7FF8;
            --purple-soft: #EEF0FF;
            --purple-bg: #F4F3FF;
            --gold: #F5A623;
            --gold-soft: #FFF8ED;
            --text-dark: #1A1A2E;
            --text-mid: #4A4A6A;
            --text-light: #9090B0;
            --bg: #F7F7FA;
            --white: #FFFFFF;
            --border: #E8E8F0;
            --green: #22C55E;
            --red: #EF4444;
            --radius: 16px;
            --shadow: 0 2px 20px rgba(107, 92, 246, 0.08);
            --shadow-md: 0 8px 40px rgba(107, 92, 246, 0.15);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            line-height: 1.6;
        }

        .serif { font-family: 'DM Serif Display', serif; }

        a { text-decoration: none; color: inherit; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--purple);
            color: white;
        }
        .btn-primary:hover { background: var(--purple-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(107, 92, 246, 0.35); }

        .btn-outline {
            background: transparent;
            color: var(--purple);
            border: 1.5px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--purple); background: var(--purple-soft); }

        .btn-full { width: 100%; }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-dark);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--purple), var(--gold));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: white;
            font-family: 'DM Serif Display', serif;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
        }

        .fade-in {
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-center {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        input, textarea, select {
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        .error-msg {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #B91C1C;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .error-msg.show { display: block; }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script>
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
